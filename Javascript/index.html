<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1> Student Management System</h1>

        <div class="search-box">
            <input
                type="text"
                id="search"
                placeholder="Search by Name, Roll No or Course..."
            >
        </div>

        <form id="studentForm">

            <div class="input-group">
                <label>Student Name</label>
                <input
                    type="text"
                    id="name"
                    placeholder="Enter Student Name"
                >
            </div>

            <div class="input-group">
                <label>Roll Number</label>
                <input
                    type="text"
                    id="roll"
                    placeholder="Enter Roll Number"
                >
            </div>

            <div class="input-group">
                <label>Age</label>
                <input
                    type="number"
                    id="age"
                    placeholder="Enter Age"
                >
            </div>

            <div class="input-group">
                <label>Course</label>
                <input
                    type="text"
                    id="course"
                    placeholder="Enter Course"
                >
            </div>

            <div class="input-group">
                <label>Email</label>
                <input
                    type="email"
                    id="email"
                    placeholder="Enter Email"
                >
            </div>

            <p id="message"></p>

            <div class="button-group">

                <button type="submit" id="addBtn">
                    Add Student
                </button>

                <button type="button" id="sortAZ">
                    Sort A-Z
                </button>
                
                <button type="button" id="sortZA">
                    Sort Z-A
                </button>
                
                <button type="button" id="darkMode">
                    Dark Mode
                </button>
            
            </div>
        </form>

        <h2>
            Total Students :
            <span id="counter">0</span>
        </h2>

        <p id="emptyMessage">
            No Students Found
        </p>

        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Roll No</th>
                    <th>Age</th>
                    <th>Course</th>
                    <th>Email</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="studentTable">
            </tbody>
        </table>
    </div>

    <script src="app.js"></script>
</body>
</html>
